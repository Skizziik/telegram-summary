services:
  - type: cron
    name: telegram-summary
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Render использует UTC. 20:00 UTC = 23:00 по Москве (UTC+3).
    schedule: "0 20 * * *"
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
